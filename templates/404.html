<!-- templates/404.html -->
{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
        <h1 style="font-size: 4rem; color: #d46b5e;">404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you're looking for doesn't exist.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top: 1rem;">Go Home</a>
</div>
{% endblock %}
